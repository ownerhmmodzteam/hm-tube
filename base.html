<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM TUBE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #a855f7; --ios-glass: rgba(18, 18, 18, 0.85); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; overflow-x: hidden; }
        
        .ios-nav { position: sticky; top: 0; background: var(--ios-glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 12px 20px; z-index: 9999; border-bottom: 0.5px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .hm-logo-text { font-size: 20px; font-weight: 900; font-style: italic; color: #fff; }
        .hm-logo-text span { color: var(--accent); }

        .search-pill { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 8px 16px; display: flex; align-items: center; flex: 1; margin: 0 15px; }
        .search-pill input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 14px; }

        #video-player-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; overflow-y: auto; padding-top: 60px; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #111; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }

        #ios-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .ios-alert { background: rgba(30, 30, 30, 0.7); width: 280px; border-radius: 20px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.1); text-align: center; animation: alertScale 0.2s ease; }
        @keyframes alertScale { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .info-list { padding: 0 15px 15px 15px; }
        .info-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; }
        .info-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .info-value { color: #a855f7; font-weight: 600; }
        .modal-btn { width: 100%; padding: 14px; background: transparent; border: none; border-top: 0.5px solid rgba(255,255,255,0.1); color: #0A84FF; font-size: 17px; font-weight: 600; }

        .v-card { margin-bottom: 20px; padding: 0 10px; }
        .v-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; background: #111; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--ios-glass); backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding: 12px 0 30px 0; border-top: 0.5px solid rgba(255,255,255,0.1); z-index: 9999; }
        .tab-item { color: #8e8e93; font-size: 20px; }
        .tab-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="ios-modal-overlay">
        <div id="modal-content"></div>
    </div>

    <nav class="ios-nav">
        <div class="hm-logo-text">HM <span>TUBE</span></div>
        <div class="search-pill">
            <input type="text" id="query" placeholder="Search...">
        </div>
        <div class="w-8 h-8 rounded-full bg-purple-500" onclick="showProfile()"></div>
    </nav>

    <div id="video-player-layer">
        <div class="p-3 flex items-center gap-3 bg-black/50" onclick="closePlayer()">
            <i class="fa-solid fa-chevron-left"></i> <span>Kembali</span>
        </div>
        <div class="player-wrapper" id="player-target"></div>
        <div class="p-5">
            <h3 id="playing-title" class="font-bold text-lg"></h3>
            <p id="playing-author" class="text-sm opacity-50 mb-5"></p>
            <div id="related-feed"></div>
        </div>
    </div>

    <main class="p-4 pb-32">
        <h2 id="section-title" class="text-xl font-bold mb-5">Untuk Tuan</h2>
        <div id="feed" class="grid grid-cols-1 gap-4"></div>
    </main>

    <div class="tab-bar">
        <div class="tab-item active" onclick="loadTrending()"><i class="fa-solid fa-house"></i></div>
        <div class="tab-item" onclick="showProfile()"><i class="fa-solid fa-user"></i></div>
    </div>

    <script>
        const nodes = ['https://iv.melmac.space', 'https://invidious.lunar.icu'];
        let currentVideoList = [];

        function showProfile() {
            document.getElementById('modal-content').innerHTML = `
                <div class="ios-alert">
                    <div class="p-5 font-bold">Informasi Sistem</div>
                    <div class="info-list">
                        <div class="info-box">
                            <div class="info-item"><span>Nomor Build</span><span class="info-value">V1.0.0</span></div>
                            <div class="info-item"><span>Owner</span><span class="info-value">Muhammad Raihan Musalah</span></div>
                            <div class="info-item" style="border:none"><span>Teamed</span><span class="info-value">HM MODZ TEAM</span></div>
                        </div>
                    </div>
                    <button class="modal-btn" onclick="closeModal()">Tutup</button>
                </div>
            `;
            document.getElementById('ios-modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('ios-modal-overlay').style.display = 'none'; }

        async function playVideo(videoId, title, author) {
            document.getElementById('playing-title').innerText = title;
            document.getElementById('playing-author').innerText = author;
            document.getElementById('player-target').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allowfullscreen></iframe>`;
            document.getElementById('video-player-layer').style.display = 'block';
            renderRelated();
            window.history.pushState({playing: true}, "");
        }

        function closePlayer() {
            document.getElementById('video-player-layer').style.display = 'none';
            document.getElementById('player-target').innerHTML = '';
            if(window.history.state?.playing) window.history.back();
        }

        window.onpopstate = () => {
            document.getElementById('video-player-layer').style.display = 'none';
            closeModal();
        };

        function render(items, targetId = 'feed') {
            const target = document.getElementById(targetId);
            target.innerHTML = '';
            items.forEach(v => {
                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => playVideo(v.videoId, v.title, v.author);
                card.innerHTML = `
                    <div class="v-thumb"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg"></div>
                    <div class="mt-2 font-bold text-sm line-clamp-2">${v.title}</div>
                `;
                target.appendChild(card);
            });
        }

        function renderRelated() {
            render(currentVideoList.sort(() => 0.5 - Math.random()).slice(0, 5), 'related-feed');
        }

        async function loadTrending() {
            const r = await fetch(`${nodes[0]}/api/v1/trending?region=ID`);
            currentVideoList = await r.json();
            render(currentVideoList);
        }

        window.onload = loadTrending;
    </script>
</body>
</html>
