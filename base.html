<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM TUBE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #a855f7; --ios-glass: rgba(18, 18, 18, 0.85); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        
        .ios-nav { position: sticky; top: 0; background: var(--ios-glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 12px 20px; z-index: 3000; border-bottom: 0.5px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .hm-logo-text { font-size: 20px; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        .hm-logo-text span { color: var(--accent); }

        .search-pill { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 10px 16px; display: flex; align-items: center; flex: 1; margin: 0 15px; border: 1px solid transparent; }
        .search-pill input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 15px; }

        #video-player-layer { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; }
        #video-player-layer iframe { width: 100%; height: 100%; border: none; }
        .close-player { position: absolute; top: 40px; left: 20px; z-index: 8100; font-size: 24px; color: white; filter: drop-shadow(0 0 5px #000); }

        #shorts-container { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; overflow-y: scroll; snap-type: y mandatory; }
        .short-slide { width: 100vw; height: 100vh; snap-align: start; position: relative; display: flex; align-items: center; }
        .short-slide iframe { width: 100%; height: 100%; pointer-events: none; }
        .close-shorts { position: fixed; top: 40px; right: 20px; z-index: 5100; font-size: 26px; color: white; }

        .v-card { margin-bottom: 24px; padding: 0 10px; cursor: pointer; }
        .v-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: #111; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--ios-glass); backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 0.5px solid rgba(255,255,255,0.1); z-index: 3000; }
        .tab-item { color: #8e8e93; text-align: center; }
        .tab-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="video-player-layer">
        <div class="close-player" onclick="closePlayer()"><i class="fa-solid fa-chevron-down"></i></div>
        <div id="player-target" class="w-full h-full"></div>
    </div>

    <div id="shorts-container">
        <div class="close-shorts" onclick="closeShorts()"><i class="fa-solid fa-circle-xmark"></i></div>
    </div>

    <nav class="ios-nav">
        <div class="hm-logo-text">HM <span>TUBE</span></div>
        <div class="search-pill">
            <input type="text" id="query" placeholder="Cari Video..." onkeyup="if(event.key==='Enter') search()">
        </div>
        <div class="avatar-donut"></div>
    </nav>

    <main class="p-5 pb-32">
        <h2 id="section-title" class="text-2xl font-black mb-6">Untuk Anda</h2>
        <div id="feed" class="flex flex-col"></div>
    </main>

    <div class="tab-bar">
        <div class="tab-item active" onclick="loadTrending()"><i class="fa-solid fa-house"></i><span class="text-[10px] block">Home</span></div>
        <div class="tab-item" onclick="showHistory()"><i class="fa-solid fa-clock"></i><span class="text-[10px] block">History</span></div>
        <div class="tab-item" onclick="loadShorts()"><i class="fa-solid fa-bolt"></i><span class="text-[10px] block">Shorts</span></div>
    </div>

    <script>
        const nodes = ['https://iv.melmac.space', 'https://invidious.lunar.icu', 'https://inv.tux.rs'];
        
        function playVideo(videoId, title, author) {
            const playerLayer = document.getElementById('video-player-layer');
            const playerTarget = document.getElementById('player-target');
            
            saveToHistory({videoId, title, author});

            playerTarget.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0" 
                        allow="autoplay; fullscreen" allowfullscreen></iframe>
            `;
            
            playerLayer.style.display = 'block';
            
            window.history.pushState({playing: true}, "");
        }

        function closePlayer() {
            document.getElementById('video-player-layer').style.display = 'none';
            document.getElementById('player-target').innerHTML = '';
            if(window.history.state && window.history.state.playing) {
                window.history.back();
            }
        }

        window.onpopstate = function(event) {
            document.getElementById('video-player-layer').style.display = 'none';
            document.getElementById('shorts-container').style.display = 'none';
            document.getElementById('player-target').innerHTML = '';
        };

        function render(items) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            items.forEach(v => {
                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => playVideo(v.videoId, v.title, v.author);
                card.innerHTML = `
                    <div class="v-thumb"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg"></div>
                    <div class="mt-3">
                        <p class="font-bold text-sm line-clamp-2">${v.title}</p>
                        <p class="text-[11px] opacity-50">${v.author}</p>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        async function loadTrending() {
            document.getElementById('section-title').innerText = "Untuk Tuan";
            updateTab(0);
            const r = await fetch(`${nodes[0]}/api/v1/trending?region=ID`);
            const data = await r.json();
            render(data);
        }

        function saveToHistory(v) {
            let h = JSON.parse(localStorage.getItem('hm_history') || '[]');
            h = [v, ...h.filter(x => x.videoId !== v.videoId)].slice(0, 40);
            localStorage.setItem('hm_history', JSON.stringify(h));
        }

        function updateTab(i) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-item')[i].classList.add('active');
        }

        window.onload = loadTrending;
    </script>
</body>
</html>
