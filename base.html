<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM TUBE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #a855f7; --ios-glass: rgba(18, 18, 18, 0.85); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        .ios-nav { position: sticky; top: 0; background: var(--ios-glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 12px 20px; z-index: 9999; border-bottom: 0.5px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .hm-logo-text { font-size: 20px; font-weight: 900; font-style: italic; color: #fff; cursor: pointer; }
        .hm-logo-text span { color: var(--accent); }
        .search-pill { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 10px 16px; flex: 1; margin: 0 15px; display: flex; align-items: center; }
        .search-pill input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 15px; }
        .avatar-donut { width: 38px; height: 38px; border-radius: 50%; background: #2b2c30; position: relative; cursor: pointer; }
        .avatar-donut::before { content: ''; width: 12px; height: 12px; background: #54555a; border-radius: 50%; position: absolute; top: 8px; left: 13px; }
        .avatar-donut::after { content: ''; width: 22px; height: 10px; background: #54555a; border-radius: 10px 10px 0 0; position: absolute; bottom: 6px; left: 8px; }
        #video-player-layer { position: fixed; inset: 0; background: #000; z-index: 9500; display: none; overflow-y: auto; overflow-x: hidden; }
        .player-wrapper { width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        @media (orientation: portrait) { .player-wrapper { aspect-ratio: 16/9; } }
        @media (orientation: landscape) { .player-wrapper { height: 100vh; } }
        #player-target { width: 100%; height: 100%; }
        .gesture-area { position: absolute; top: 0; width: 35%; height: 100%; z-index: 9510; display: flex; align-items: center; justify-content: center; }
        #left-gesture { left: 0; }
        #right-gesture { right: 0; }
        .skip-anim { background: rgba(255,255,255,0.25); border-radius: 50%; width: 45px; height: 45px; display: none; align-items: center; justify-content: center; font-size: 12px; pointer-events: none; flex-direction: column; }
        #ios-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .ios-alert { background: rgba(35, 35, 35, 0.9); width: 280px; border-radius: 20px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.1); text-align: center; }
        .info-box { background: rgba(255,255,255,0.05); border-radius: 12px; margin: 15px; padding: 10px; text-align: left; }
        .info-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .info-value { color: var(--accent); font-weight: 600; }
        .modal-btn { width: 100%; padding: 14px; background: transparent; border: none; border-top: 0.5px solid rgba(255,255,255,0.1); color: #0A84FF; font-size: 17px; font-weight: 600; }
        .v-card { margin-bottom: 24px; padding: 0 10px; cursor: pointer; }
        .v-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 18px; overflow: hidden; background: #111; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--ios-glass); backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding: 12px 0 32px 0; border-top: 0.5px solid rgba(255,255,255,0.1); z-index: 8000; transition: transform 0.3s ease; }
        .tab-bar.hide { transform: translateY(100%); }
        .tab-item { color: #8e8e93; text-align: center; font-size: 10px; }
        .tab-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .tab-item.active { color: var(--accent); }
        .set-btn { background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 10px; font-size: 11px; border: 0.5px solid rgba(255,255,255,0.15); transition: 0.2s; }
        .set-btn.active { background: var(--accent); border-color: transparent; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ios-modal-overlay"><div id="modal-content"></div></div>
    <div id="video-player-layer">
        <div class="p-4 flex items-center gap-3" id="back-btn" onclick="handleBack()">
            <i class="fa-solid fa-chevron-left"></i> <span>Kembali</span>
        </div>
        <div class="player-wrapper">
            <div id="player-target"></div>
            <div class="gesture-area" id="left-gesture"><div class="skip-anim" id="l-anim"><i class="fa-solid fa-backward"></i><span class="text-[8px]">10s</span></div></div>
            <div class="gesture-area" id="right-gesture"><div class="skip-anim" id="r-anim"><i class="fa-solid fa-forward"></i><span class="text-[8px]">10s</span></div></div>
        </div>
        <div class="p-5" id="video-details">
            <h3 id="playing-title" class="font-bold text-lg line-clamp-2 mb-2"></h3>
            <p id="playing-author" class="text-xs opacity-50 mb-5"></p>
            
            <p class="text-[10px] uppercase tracking-widest opacity-40 mb-2">Kualitas Video</p>
            <div class="flex flex-wrap gap-2 mb-5" id="quality-controls">
                <button class="set-btn" onclick="setQuality('small')">360p</button>
                <button class="set-btn" onclick="setQuality('medium')">480p</button>
                <button class="set-btn" onclick="setQuality('hd720')">720p</button>
                <button class="set-btn active" onclick="setQuality('hd1080')">1080p</button>
            </div>

            <p class="text-[10px] uppercase tracking-widest opacity-40 mb-2">Kecepatan Putar</p>
            <div class="flex gap-2 mb-6">
                <button class="set-btn speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                <button class="set-btn speed-btn active" onclick="setSpeed(1)">Normal</button>
                <button class="set-btn speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <button class="set-btn speed-btn" onclick="setSpeed(2)">2x</button>
            </div>

            <hr class="border-white/10 mb-5">
            <h4 class="text-sm font-bold text-purple-400 mb-4">Rekomendasi</h4>
            <div id="related-feed"></div>
        </div>
    </div>
    <nav class="ios-nav">
        <div class="hm-logo-text" onclick="loadTrending()">HM <span>TUBE</span></div>
        <div class="search-pill">
            <input type="text" id="query" placeholder="Cari video..." 
                onfocus="document.querySelector('.tab-bar').classList.add('hide')" 
                onblur="setTimeout(()=>document.querySelector('.tab-bar').classList.remove('hide'), 300)"
                onkeyup="if(event.key==='Enter') startSearch(this.value)">
        </div>
        <div class="avatar-donut" onclick="showProfile()"></div>
    </nav>
    <main class="p-5 pb-40">
        <h2 id="section-title" class="text-2xl font-black mb-6">Untuk Tuan</h2>
        <div id="feed" class="flex flex-col"></div>
    </main>
    <div class="tab-bar">
        <div class="tab-item active" onclick="loadTrending()"><i class="fa-solid fa-house"></i>Home</div>
        <div class="tab-item" onclick="showHistory()"><i class="fa-solid fa-clock"></i>History</div>
        <div class="tab-item" onclick="showProfile()"><i class="fa-solid fa-user"></i>Profile</div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const nodes = ['https://iv.melmac.space', 'https://invidious.lunar.icu'];
        let player, currentData = [], lastTap = 0;
        window.onpopstate = () => { if (document.getElementById('video-player-layer').style.display === 'block') closePlayerLogic(); };
        function handleBack() { window.history.back(); }
        function showProfile() {
            document.getElementById('modal-content').innerHTML = `
                <div class="ios-alert">
                    <div class="p-5 font-bold">Informasi Sistem</div>
                    <div class="info-box">
                        <div class="info-item"><span>Nomor Build</span><span class="info-value">V1.0.0</span></div>
                        <div class="info-item"><span>Owner</span><span class="info-value">Muhammad Raihan Musalah</span></div>
                        <div class="info-item" style="border:none"><span>Teamed</span><span class="info-value">HM MODZ TEAM</span></div>
                    </div>
                    <button class="modal-btn" onclick="closeModal()">Tutup</button>
                </div>`;
            document.getElementById('ios-modal-overlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('ios-modal-overlay').style.display = 'none'; }
        async function startSearch(q) {
            if(!q) return;
            document.getElementById('section-title').innerText = `Hasil: ${q}`;
            document.getElementById('feed').innerHTML = '<p class="text-center py-20 opacity-50">Mencari...</p>';
            try {
                const r = await fetch(`${nodes[0]}/api/v1/search?q=${encodeURIComponent(q)}`);
                const data = await r.json();
                render(data);
                document.activeElement.blur();
            } catch (e) { document.getElementById('feed').innerHTML = '<p class="text-center py-20">Gagal, Tuan.</p>'; }
        }
        function setSpeed(s) {
            if(player && player.setPlaybackRate) {
                player.setPlaybackRate(s);
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
            }
        }
        function setQuality(q) {
            if(player && player.setPlaybackQuality) {
                player.setPlaybackQuality(q);
                document.querySelectorAll('#quality-controls .set-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
            }
        }
        function saveHistory(v) {
            let h = JSON.parse(localStorage.getItem('hm_history') || '[]');
            h = [v, ...h.filter(x => x.videoId !== v.videoId)].slice(0, 30);
            localStorage.setItem('hm_history', JSON.stringify(h));
        }
        function showHistory() {
            const h = JSON.parse(localStorage.getItem('hm_history') || '[]');
            document.getElementById('section-title').innerText = "Riwayat Tontonan";
            updateTab(1);
            render(h);
        }
        async function playVideo(v) {
            saveHistory(v);
            document.getElementById('playing-title').innerText = v.title;
            document.getElementById('playing-author').innerText = v.author;
            document.getElementById('video-player-layer').style.display = 'block';
            window.history.pushState({playing: true}, "");
            if (player) player.destroy();
            player = new YT.Player('player-target', {
                height: '100%', width: '100%', videoId: v.videoId,
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin },
                events: { 'onReady': (e) => { setupGst(); e.target.playVideo(); } }
            });
            render([...currentData].sort(() => 0.5 - Math.random()).slice(0, 6), 'related-feed');
        }
        function setupGst() {
            document.getElementById('left-gesture').onclick = (e) => handleTap(e, -10);
            document.getElementById('right-gesture').onclick = (e) => handleTap(e, 10);
        }
        function handleTap(e, sec) {
            let now = new Date().getTime();
            if (now - lastTap < 300) {
                player.seekTo(player.getCurrentTime() + sec, true);
                let anim = sec > 0 ? 'r-anim' : 'l-anim';
                let el = document.getElementById(anim);
                el.style.display = 'flex';
                setTimeout(() => el.style.display = 'none', 600);
            }
            lastTap = now;
        }
        function closePlayerLogic() {
            document.getElementById('video-player-layer').style.display = 'none';
            if (player) player.stopVideo();
        }
        function render(items, targetId = 'feed') {
            const target = document.getElementById(targetId);
            target.innerHTML = items.length ? '' : '<p class="text-center opacity-30 py-20">Kosong.</p>';
            items.forEach(v => {
                if(!v.videoId) return;
                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => playVideo(v);
                card.innerHTML = `<div class="v-thumb"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg"></div><div class="mt-3"><p class="font-bold text-sm line-clamp-2">${v.title}</p><p class="text-[11px] opacity-50">${v.author}</p></div>`;
                target.appendChild(card);
            });
        }
        async function loadTrending() {
            document.getElementById('section-title').innerText = "Untuk Tuan";
            updateTab(0);
            try {
                const r = await fetch(`${nodes[0]}/api/v1/trending?region=ID`);
                currentData = await r.json();
                render(currentData);
            } catch (e) {}
        }
        function updateTab(i) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-item')[i].classList.add('active');
        }
        window.onload = loadTrending;
        window.addEventListener('resize', () => {
            const isLandscape = window.innerWidth > window.innerHeight;
            document.getElementById('back-btn').style.display = isLandscape ? 'none' : 'flex';
            document.getElementById('video-details').style.display = isLandscape ? 'none' : 'block';
        });
    </script>
</body>
</html>
